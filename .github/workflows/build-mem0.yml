name: Build and Push Mem0 Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone Mem0 source
        run: git clone --depth=1 https://github.com/mem0ai/mem0.git ./mem0-source
      
      - name: Add psycopg to requirements and install libpq-dev
        run: |
          echo "psycopg[binary]>=3.2.0" >> ./mem0-source/server/requirements.txt
          sed -i 's|^(RUN pip install.*)$|RUN apt-get update \&\& apt-get install -y libpq-dev \&\& pip install --no-cache-dir -r requirements.txt|' ./mem0-source/server/Dockerfile
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v5
        with:
          context: ./mem0-source/server
          push: true
          tags: ghcr.io/nanachichan3/mem0:${{ inputs.tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true
