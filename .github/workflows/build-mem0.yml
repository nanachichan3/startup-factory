name: Build and Push Mem0 Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone Mem0 source
        run: |
          git clone --depth=1 https://github.com/mem0ai/mem0.git
          cp mem0/server/* .
          cp mem0/server/requirements.txt ./original_requirements.txt
          cp requirements.mem0.txt ./requirements.txt
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mem0
          push: true
          tags: ghcr.io/nanachichan3/mem0:v8
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
