version: '3.8'

services:
  # Factory API Server
  factory-api:
    build:
      context: ./packages/harness
      dockerfile: Dockerfile
    container_name: startup-factory-api
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-}
      - DB_USER=${DB_USER:-}
      - DB_PASS=${DB_PASS:-}
      - DB_NAME=${DB_NAME:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-password}
      - REDIS_HOST=${REDIS_HOST:-}
      - DEMO_MODE=${DEMO_MODE:-false}
    networks:
      - factory-network
    restart: unless-stopped

  # Discord Gateway
  discord-gateway:
    build:
      context: ./packages/discord-gateway
      dockerfile: Dockerfile
    container_name: startup-factory-discord
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - FACTORY_API_URL=http://factory-api:3000
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-password}
    depends_on:
      - factory-api
    networks:
      - factory-network
    restart: unless-stopped

networks:
  factory-network:
    driver: bridge
