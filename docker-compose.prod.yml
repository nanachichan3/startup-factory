version: '3.8'

services:
  # Temporal + PostgreSQL (internal to Coolify network)
  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    # NO host ports - internal only
    networks:
      - factory-net

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: factory-temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
      - POSTGRES_DB=temporal
      - ENABLE_ES=true
    # NO host ports - internal only
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - factory-net

  # Factory API (the main application)
  factory-api:
    build:
      context: .
      dockerfile: packages/harness/Dockerfile
    container_name: factory-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - DATABASE_URL=postgres://temporal:temporal@postgres:5432/temporal
      - DASHBOARD_USER=admin
      - DASHBOARD_PASS=${DASHBOARD_PASS:-factory2026}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - FACTORY_API_URL=${FACTORY_API_URL:-http://factory-api:3000}
      - MEM0_BASE_URL=${MEM0_BASE_URL:-}
    # NO host ports - internal only
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - factory-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.factory.rule=Host(`startup-factory.qed.quest`)"
      - "traefik.http.services.factory.loadbalancer.server.port=3000"
      - "traefik.http.routers.factory.tls=true"
      - "traefik.http.routers.factory.tls.certresolver=letsencrypt"

  # Rick — CMO Agent (OpenClaw)
  # Runs the CMO/Rich personality, connects to Temporal + factory-api
  rick:
    build:
      context: .
      dockerfile: packages/harness/Dockerfile.openclaw
    container_name: factory-rick
    restart: unless-stopped
    volumes:
      - rick-data:/root/.openclaw
    environment:
      - RICK_MODEL=${RICK_MODEL:-minimax/minimax-m2.7}
      - RICK_INFERENCE_PROVIDER=${RICK_INFERENCE_PROVIDER:-openrouter}
      - RICK_GATEWAY_PORT=${RICK_GATEWAY_PORT:-18791}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS:-588858125126336544,1484966987321835733}
      - "DISCORD_REQUIRE_MENTION=${DISCORD_REQUIRE_MENTION:-false}"
      - DISCORD_FREE_RESPONSE_CHANNELS=${DISCORD_FREE_RESPONSE_CHANNELS:-1489982401445888000,1489982424594251920,1484900474363842643}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - WORKSPACE_GIT_URL=${RICH_WORKSPACE_GIT_URL:-https://github.com/nanachichan3/rich-workspace.git}
      - WORKSPACE_GIT_REF=${WORKSPACE_GIT_REF:-master}
      - WORKSPACE_GIT_TOKEN=${WORKSPACE_GIT_TOKEN:-}
      - BOT_COORDINATION_DB_HOST=${BOT_COORDINATION_DB_HOST:-x0k4w8404wckwwcswg808gco}
      - BOT_COORDINATION_DB_PORT=${BOT_COORDINATION_DB_PORT:-5432}
      - BOT_COORDINATION_DB_USER=${BOT_COORDINATION_DB_USER:-postgres}
      - BOT_COORDINATION_DB_PASS=${BOT_COORDINATION_DB_PASS:-WFBGCo6cjCf7NbxVfkPSe5x0P41v3d27MowubhpPmfk9CgrfcMhBUvp8lyCfjobL}
      - BOT_COORDINATION_DB_NAME=${BOT_COORDINATION_DB_NAME:-projects}
      - PROJECTS_MCP_DATABASE_URL=${PROJECTS_MCP_DATABASE_URL:-postgres://postgres:WFBGCo6cjCf7NbxVfkPSe5x0P41v3d27MowubhpPmfk9CgrfcMhBUvp8lyCfjobL@x0k4w8404wckwwcswg808gco:5432/projects}
    ports:
      - "18791:18791"
    networks:
      - factory-net
    depends_on:
      temporal:
        condition: service_started

volumes:
  postgres_data:
  rick-data:

networks:
  factory-net:
    driver: bridge
