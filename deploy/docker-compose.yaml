version: '3.8'

services:
  startup-factory:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.startup-factory.rule=Host(`startup-factory.qed.quest`)"
      - "traefik.http.services.startup-factory.loadbalancer.server.port=3000"
    networks:
      - coolify

networks:
  coolify:
    external: true
    name: coolify
