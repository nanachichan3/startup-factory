server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        return 200 '<html><head><title>Mem0 Dashboard</title></head><body><h1>Mem0 Dashboard</h1><p>API: <a href="http://mem0.rachkovan.com">mem0.rachkovan.com</a></p><p>Status: Running</p></body></html>';
        add_header Content-Type text/html;
    }
}
