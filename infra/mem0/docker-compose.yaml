version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v5
    container_name: factory-mem0
    restart: unless-stopped
    ports:
      - "8888:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_COLLECTION_NAME=memories
      - HISTORY_DB_PATH=/data/history.db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0neo4j
    volumes:
      - mem0_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  postgres:
    image: ankane/pgvector:latest
    container_name: factory-mem0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mem0_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.23.0
    container_name: factory-mem0-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/mem0neo4j
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mem0neo4j 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mem0_pgdata:
  mem0_data:
  neo4j_data:
