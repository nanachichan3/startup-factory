version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v9
    container_name: factory-mem0
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - HISTORY_DB_PATH=/app/history/memory.db
    volumes:
      - mem0_data:/app/data
      - mem0_logs:/tmp
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0.rule=Host(`osmqw04ftbdhud2cxp3e9s3p.qed.quest`)"
      - "traefik.http.services.mem0.loadbalancer.server.port=5000"
      - "traefik.http.routers.mem0.tls=true"
      - "traefik.http.routers.mem0.tls.certresolver=letsencrypt"
    healthcheck:
      disable: true
    entrypoint:
      - sh
      - -c
      - >
        python3 -c "
import sys
sys.stdout.flush()
try:
    import main
    with open('/tmp/startup_status.txt', 'w') as f:
        f.write('IMPORT_OK')
except Exception as e:
    with open('/tmp/startup_error.txt', 'w') as f:
        f.write(str(e))
    import traceback
    with open('/tmp/startup_trace.txt', 'w') as f:
        f.write(traceback.format_exc())
" 2>&1 | tee /tmp/startup.log;
        cat /tmp/startup.log;
        if grep -q IMPORT_OK /tmp/startup_status.txt 2>/dev/null; then
          exec uvicorn main:app --host 0.0.0.0 --port 5000;
        else
          echo 'Import failed, sleeping for debug...';
          cat /tmp/startup_error.txt /tmp/startup_trace.txt 2>/dev/null;
          sleep 36000;
        fi

volumes:
  mem0_data:
  mem0_logs:

networks:
  coolify:
    name: coolify
    external: true
