version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v9
    container_name: factory-mem0
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - HISTORY_DB_PATH=/app/history/memory.db
    volumes:
      - mem0_data:/app/data
      - mem0_logs:/tmp
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0.rule=Host(`osmqw04ftbdhud2cxp3e9s3p.qed.quest`)"
      - "traefik.http.services.mem0.loadbalancer.server.port=5000"
      - "traefik.http.routers.mem0.tls=true"
      - "traefik.http.routers.mem0.tls.certresolver=letsencrypt"
    healthcheck:
      disable: true
    entrypoint: ["sh", "-c", "python3 -c \"import main; print('IMPORT_OK')\" > /tmp/startup.log 2>&1; tail -f /tmp/startup.log & sleep 5; exec uvicorn main:app --host 0.0.0.0 --port 5000"]

volumes:
  mem0_data:
  mem0_logs:

networks:
  coolify:
    name: coolify
    external: true
