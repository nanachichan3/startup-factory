version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v8
    container_name: factory-mem0
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - HISTORY_DB_PATH=/app/history/memory.db
    volumes:
      - mem0_data:/app/data
      - mem0_logs:/tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: ["sh", "-c", "python3 -c \"import main; print('IMPORT_OK')\" > /tmp/startup.log 2>&1; tail /tmp/startup.log; exec uvicorn main:app --host 0.0.0.0 --port 5000"]

volumes:
  mem0_data:
  mem0_logs:
