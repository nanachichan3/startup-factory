version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:latest
    container_name: factory-mem0
    restart: unless-stopped
    ports:
      - "8888:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/mem0}
      - MEM0_DATABASE=pgvector
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ankane/pgvector:latest
    container_name: factory-mem0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mem0_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mem0_pgdata:
