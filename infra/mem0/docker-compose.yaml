version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v10
    container_name: factory-mem0
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - HISTORY_DB_PATH=/app/history/memory.db
    volumes:
      - mem0_data:/app/data
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0.rule=Host(`osmqw04ftbdhud2cxp3e9s3p.qed.quest`)"
      - "traefik.http.services.mem0.loadbalancer.server.port=5000"
      - "traefik.http.routers.mem0.tls=true"
      - "traefik.http.routers.mem0.tls.certresolver=letsencrypt"
    healthcheck:
      disable: true
    command:
      - sh
      - -c
      - >
        python3 -c "
import sys
sys.stderr = open('/tmp/uvicorn_err.log', 'w')
sys.stdout = open('/tmp/uvicorn_out.log', 'w')
import main
" 2>&1 | tee /tmp/startup_err.log;
        cat /tmp/startup_err.log;
        if grep -q "Traceback" /tmp/startup_err.log 2>/dev/null; then
          echo 'Import FAILED, sleeping for debug...';
          tail -100 /tmp/startup_err.log;
          sleep 36000;
        else
          echo 'Import OK, starting uvicorn...';
          exec uvicorn main:app --host 0.0.0.0 --port 5000 --reload;
        fi

volumes:
  mem0_data:

networks:
  coolify:
    name: coolify
    external: true
