version: '3.8'

services:
  mem0-postgres:
    image: pgvector/pgvector:0.5.1
    container_name: factory-mem0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MEM0_POSTGRES_PASSWORD:-mem0-local-pg}
      POSTGRES_DB: mem0
    volumes:
      - mem0-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coolify

  mem0:
    image: ghcr.io/nanachichan3/mem0:v12
    container_name: factory-mem0
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - POSTGRES_HOST=mem0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${MEM0_POSTGRES_PASSWORD:-mem0-local-pg}
      - POSTGRES_COLLECTION_NAME=mem0
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${MEM0_JWT_SECRET:-change-me-mem0-jwt}
      - ADMIN_API_KEY=${MEM0_API_KEY:-mem0-local-api-key}
      - AUTH_DISABLED=false
      - DASHBOARD_URL=http://mem0-dashboard:3000
    depends_on:
      mem0-postgres:
        condition: service_healthy
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0-api.rule=Host(`mem0.rachkovan.com`) && (PathPrefix(`/api`) || PathPrefix(`/v1`) || PathPrefix(`/health`) || PathPrefix(`/docs`))"
      - "traefik.http.routers.mem0-api.service=mem0-api"
      - "traefik.http.services.mem0-api.loadbalancer.server.port=5000"

  mem0-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.mem0-dashboard
    container_name: factory-mem0-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://mem0.rachkovan.com
      - API_INTERNAL_URL=http://mem0:5000
      - NEXT_PUBLIC_INSTANCE_NAME=Nanachi Mem0
    depends_on:
      mem0:
        condition: service_started
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0-dash.rule=Host(`mem0.rachkovan.com`)"
      - "traefik.http.routers.mem0-dash.service=mem0-dash"
      - "traefik.http.services.mem0-dash.loadbalancer.server.port=3000"

volumes:
  mem0-pg-data:

networks:
  coolify:
    name: coolify
    external: true
