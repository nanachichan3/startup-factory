# Mem0 is configured via Mem0 Cloud API
# For self-hosted: Build amd64 image from source and push to GHCR
# 
# To get started with Mem0 Cloud:
# 1. Sign up at https://app.mem0.ai
# 2. Get your API key
# 3. Add MEM0_API_KEY to your env vars
#
# Mem0 Cloud API base: https://api.mem0.ai/v1
version: '3.8'

services:
  # Mem0 is used via cloud API - no local container needed
  # The factory harness calls Mem0 Cloud API directly
  # Point to: https://api.mem0.ai/v1 with your API key
