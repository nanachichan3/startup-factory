version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v8
    container_name: factory-mem0
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - HISTORY_DB_PATH=/app/history/memory.db
    volumes:
      - mem0_data:/app/data
      - mem0_logs:/tmp
    command: >
      sh -c
      "python3 -c \"import main; print('IMPORT_OK')\" > /tmp/startup.log 2>&1 || true ;
      tail /tmp/startup.log ;
      sleep 36000"
    healthcheck:
      disable: true

volumes:
  mem0_data:
  mem0_logs:
