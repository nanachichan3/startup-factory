version: '3.8'

services:
  mem0:
    image: ghcr.io/nanachichan3/mem0:v12
    container_name: factory-mem0
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - SERVICE_URL_NGINX=http://mem0.qed.quest
      - SERVICE_FQDN_NGINX=mem0.qed.quest
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0-rachkovan.rule=Host(`mem0.rachkovan.com`)"
      - "traefik.http.routers.mem0-rachkovan.entrypoints=http"
      - "traefik.http.routers.mem0-rachkovan.service=mem0-rachkovan"
      - "traefik.http.services.mem0-rachkovan.loadbalancer.server.port=5000"
      - "traefik.http.routers.mem0-rachkovan.middlewares=gzip"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.routers.mem0-api.rule=Host(`mem0.rachkovan.com`) && (PathPrefix(`/api`) || PathPrefix(`/v1`) || PathPrefix(`/health`) || PathPrefix(`/docs`))"
      - "traefik.http.routers.mem0-api.service=mem0-api"
      - "traefik.http.services.mem0-api.loadbalancer.server.port=5000"

networks:
  coolify:
    name: coolify
    external: true
