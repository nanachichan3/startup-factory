version: '3.8'
services:
  mem0:
    image: mem0ai/mem0:latest
    ports:
      - "5010:5000"
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - mem0_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - mem0_network

volumes:
  mem0_data:

networks:
  mem0_network:
    driver: bridge
