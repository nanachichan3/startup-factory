version: '3.8'

services:
  mem0:
    image: nginx:alpine
    container_name: factory-mem0
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0.rule=Host(`osmqw04ftbdhud2cxp3e9s3p.qed.quest`)"
      - "traefik.http.services.mem0.loadbalancer.server.port=80"
      - "traefik.http.routers.mem0.tls=true"
      - "traefik.http.routers.mem0.tls.certresolver=letsencrypt"
    healthcheck:
      disable: true

networks:
  coolify:
    name: coolify
    external: true
