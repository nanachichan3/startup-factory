<!DOCTYPE html>
<html>
<head>
    <title>Mem0 Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #1a1a2e; color: #eee; }
        h1 { color: #00d4ff; }
        .status { padding: 20px; background: #16213e; border-radius: 8px; margin: 20px 0; }
        .api-status { color: #00ff88; }
        .error { color: #ff4757; }
        input { padding: 10px; width: 300px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #0f0f23; padding: 20px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧠 Mem0 Dashboard</h1>
    <div class="status">
        <h2>API Status</h2>
        <p id="api-status">Checking...</p>
    </div>
    
    <h3>Test Memory</h3>
    <input type="text" id="user-id" placeholder="User ID" value="test-user">
    <input type="text" id="memory" placeholder="Memory text">
    <button onclick="addMemory()">Add Memory</button>
    
    <h3>Search Memories</h3>
    <input type="text" id="query" placeholder="Search query">
    <button onclick="searchMemories()">Search</button>
    
    <pre id="result">Results will appear here</pre>
    
    <script>
        const API_URL = 'http://mem0.rachkovan.com:5000';
        
        async function checkStatus() {
            try {
                const res = await fetch(API_URL + '/health');
                const data = await res.json();
                document.getElementById('api-status').innerHTML = 
                    '<span class="api-status">✅ Healthy</span><br>Status: ' + JSON.stringify(data);
            } catch (e) {
                document.getElementById('api-status').innerHTML = 
                    '<span class="error">❌ Error: ' + e.message + '</span>';
            }
        }
        
        async function addMemory() {
            const userId = document.getElementById('user-id').value;
            const memory = document.getElementById('memory').value;
            
            try {
                const res = await fetch(API_URL + '/memories', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        messages: [{role: 'user', content: memory}]
                    })
                });
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
        
        async function searchMemories() {
            const userId = document.getElementById('user-id').value;
            const query = document.getElementById('query').value;
            
            try {
                const res = await fetch(API_URL + '/search?user_id=' + encodeURIComponent(userId) + '&query=' + encodeURIComponent(query));
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
        
        checkStatus();
    </script>
</body>
</html>
