version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      factory-network:
        aliases:
          - postgres

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: factory-temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal123
      - POSTGRES_SEEDS=postgres
      - ENABLE_ES=true
      - DEPLOY_MODE=development
    ports:
      - "7234:7233"
      - "8088:8080"
    networks:
      - factory-network
    depends_on:
      postgres:
        condition: service_healthy

  factory:
    image: ghcr.io/nanachichan3/startup-factory:latest
    container_name: factory-api
    restart: unless-stopped
    command: node dist/index.js
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - DATABASE_URL=postgres://temporal:temporal123@factory-postgres:5432/temporal
      - DASHBOARD_USER=admin
      - DASHBOARD_PASS=factory2026
      - MEM0_BASE_URL=http://mem0:5000
    networks:
      - factory-network
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.factory.rule=Host(`startup-factory.qed.quest`)
      - traefik.http.services.factory.loadbalancer.server.port=3000
      - traefik.http.routers.factory.tls=true
      - traefik.http.routers.factory.tls.certresolver=letsencrypt
  mem0:
    image: ghcr.io/nanachichan3/mem0:v12
    container_name: mem0-server
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
    networks:
      - factory-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0.rule=Host(`osmqw04ftbdhud2cxp3e9s3p.qed.quest`)
      - traefik.http.services.mem0.loadbalancer.server.port=5000
      - traefik.http.routers.mem0.tls=true
      - traefik.http.routers.mem0.tls.certresolver=letsencrypt

networks:
  factory-network:
    driver: bridge

volumes:
  postgres_data:
