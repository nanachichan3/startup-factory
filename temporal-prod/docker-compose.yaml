version: '3.8'

networks:
  factory-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      - factory-network

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: factory-temporal
    restart: unless-stopped
    ports:
      - "7234:7233"
      - "8088:8080"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal123
      - POSTGRES_SEEDS=factory-postgres
      - POSTGRES_DB=temporal
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - factory-network

  factory:
    image: ghcr.io/nanachichan3/startup-factory:latest
    container_name: factory-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=factory-temporal:7233
      - TEMPORAL_NAMESPACE=default
      # Use local factory-postgres on the same compose network
      - DATABASE_URL=postgres://temporal:temporal123@factory-postgres:5432/temporal
      - HTTP_BASIC_AUTH_USER=admin
      - HTTP_BASIC_AUTH_PASS=factory2026
    depends_on:
      - temporal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.factory.rule=Host(`startup-factory.qed.quest`)"
      - "traefik.http.services.factory.loadbalancer.server.port=3000"
      - "traefik.http.routers.factory.tls=true"
      - "traefik.http.routers.factory.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.factory-auth.basicauth.users=admin:$$apr1$$r4Z7vUZO$$H.Vc5nF.bQAVnKzJQ5D2M/"
    networks:
      - factory-network

volumes:
  postgres_data: