version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: factory-temporal
    restart: unless-stopped
    ports:
      - "7234:7233"
      - "8088:8080"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal123
      - POSTGRES_SEEDS=factory-postgres
      - POSTGRES_DB=temporal
    depends_on:
      postgres:
        condition: service_healthy

  factory-api:
    image: ghcr.io/nanachichan3/startup-factory:latest
    container_name: factory-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:placeholder@x0k4w8404wckwwcswg808gco:5432/projects}
      - TEMPORAL_ADDRESS=factory-temporal:7233
      - TEMPORAL_NAMESPACE=default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.factory-web.rule=Host(`startup-factory.qed.quest`)"
      - "traefik.http.services.factory-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.factory-web.tls=true"
      - "traefik.http.routers.factory-web.tls.certresolver=letsencrypt"
    networks:
      - coolify

volumes:
  postgres_data:

networks:
  coolify:
    external: true
