version: '3.8'

services:
  # Temporal Workflow Engine
  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: factory-temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal123
      - POSTGRES_SEEDS=postgres
      - POSTGRES_DB=temporal
    networks:
      - factory-net

  # PostgreSQL for Temporal
  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - factory-net

  # Factory API Server
  factory-api:
    build:
      context: .
      dockerfile: packages/harness/Dockerfile
    container_name: factory-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - DATABASE_URL=postgres://temporal:temporal123@postgres:5432/temporal
      - DASHBOARD_USER=admin
      - DASHBOARD_PASS=${DASHBOARD_PASS:-factory2026}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    networks:
      - factory-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.factory.rule=Host(`startup-factory.qed.quest`)"
      - "traefik.http.services.factory.loadbalancer.server.port=3000"
      - "traefik.http.routers.factory.tls=true"
      - "traefik.http.routers.factory.tls.certresolver=letsencrypt"

volumes:
  postgres_data:

networks:
  factory-net:
    driver: bridge
