version: '3.8'

services:
  # Temporal Workflow Engine
  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: startup-factory-temporal
    ports:
      - "7234:7233"   # GRPC port
      - "8234:8233"   # HTTP port
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - factory-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: startup-factory-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: startup_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - factory-network

  # Factory API Server
  factory-api:
    build:
      context: ./packages/harness
      dockerfile: Dockerfile
    container_name: startup-factory-api
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=startup_factory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      - temporal
      - postgres
    networks:
      - factory-network

  # Discord Gateway
  discord-gateway:
    build:
      context: ./packages/discord-gateway
      dockerfile: Dockerfile
    container_name: startup-factory-discord
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - FACTORY_API_URL=http://factory-api:3000
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-password}
    depends_on:
      - factory-api
    networks:
      - factory-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  factory-network:
    driver: bridge